:schedule:
  record_price_history:
    cron: "0 2 * * *"  # 2am daily — after scrapers run
    class: RecordPriceHistoryJob
    description: "Snapshot current prices for all products"

  price_alert_check:
    cron: "30 2 * * *"  # 2:30am daily — after price history recorded
    class: PriceAlertCheckJob
    description: "Check price alerts and notify users"
