:concurrency: 5
production:
  :concurrency: 10
pidfile: tmp/pids/sidekiq_development.pid
:queues:
  - critical
  - default
  - gush
  - low
:scheduler:
  :schedule:
    craw_all:
      cron: "0 6,9,12,15,18 * * *"
      class: "Crawlers::DistributeJob"
    post_bargain:
      cron: "30 6,9,12,15,18 * * *"
      class: "PostBargainJob"
    telegram_deals:
      cron: "30 6,9,12,15,18 * * *"
      class: "TelegramDealsJob"
    price_alert_checker:
      cron: "0 7,13,19 * * *"
      class: "PriceAlertCheckerJob"
    price_drop_notifier:
      cron: "45 6,9,12,15,18 * * *"
      class: "PriceDropNotifierJob"
    cleanup_expired_deals:
      cron: "0 2 * * *"
      class: "CleanupExpiredDealsJob"
    prune_old_price_histories:
      cron: "0 3 * * 0"
      class: "PruneOldPriceHistoriesJob"


